[package]
name = "mistengine"
version = "1.0.0-alpha.3"
edition = "2021"

[[bin]]
name = "mistengine"
path = "src/main.rs"

[dependencies]
eframe = { version = "0.28", features = ["default_fonts"] }
egui = "0.28"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
sha2       = "0.10"
log        = "0.4"
env_logger = "0.11"
